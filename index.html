<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Te Conviene</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-900:#07151D;
    --ink-800:#0E2530;
    --ink-700:#16323F;
    --glow-green:#34E5A4;
    --glow-blue:#2F8FFF;
    --text-hi:#EAFBF5;
    --text-lo:#7FA39C;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background: radial-gradient(circle at 50% -10%, #123042 0%, var(--ink-900) 55%) fixed;
    font-family:'Inter', sans-serif;
    color:var(--text-hi);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 32px 18px;
  }
  .page{
    width:100%;
    max-width:420px;
  }
  .hero{
    text-align:center;
    margin-bottom:44px;
    position:relative;
  }
  .glow-orb{
    position:absolute;
    top:-60px; left:50%;
    transform:translateX(-50%);
    width:260px; height:260px;
    background: radial-gradient(circle, rgba(52,229,164,0.35) 0%, rgba(47,143,255,0.18) 45%, transparent 70%);
    filter: blur(10px);
    animation: breathe 5s ease-in-out infinite;
    pointer-events:none;
    z-index:0;
  }
  @keyframes breathe{
    0%,100%{ opacity:0.7; transform:translateX(-50%) scale(1); }
    50%{ opacity:1; transform:translateX(-50%) scale(1.08); }
  }
  @media (prefers-reduced-motion: reduce){
    .glow-orb{ animation:none; }
  }
  .brand{
    position:relative;
    z-index:1;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(34px, 9vw, 46px);
    letter-spacing:0.5px;
    text-shadow: 0 0 18px rgba(52,229,164,0.45), 0 0 40px rgba(47,143,255,0.25);
    margin-bottom:10px;
  }
  .tagline{
    position:relative;
    z-index:1;
    color:var(--text-lo);
    font-size:14.5px;
    letter-spacing:0.3px;
  }
  .links{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .link-btn{
    display:flex;
    align-items:center;
    gap:14px;
    padding:18px 20px;
    border-radius:16px;
    background:var(--ink-800);
    border:1px solid var(--ink-700);
    text-decoration:none;
    color:var(--text-hi);
    font-weight:600;
    font-size:15.5px;
    line-height:1.3;
    transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
  }
  .link-btn:active{ transform: scale(0.97); }
  .link-btn:focus-visible{
    outline: 2px solid var(--glow-green);
    outline-offset: 3px;
  }
  .bulb{
    flex-shrink:0;
    width:11px; height:11px;
    border-radius:50%;
  }
  .link-btn .label{ flex:1; }
  .link-btn .arrow{
    color:var(--text-lo);
    font-size:18px;
    flex-shrink:0;
  }
  .btn-whatsapp .bulb{
    background: var(--glow-green);
    box-shadow: 0 0 0 4px rgba(52,229,164,0.18), 0 0 12px rgba(52,229,164,0.7);
  }
  .btn-whatsapp:hover{ border-color: var(--glow-green); background:#102B38; }

  .btn-instagram .bulb{
    background: var(--glow-blue);
    box-shadow: 0 0 0 4px rgba(47,143,255,0.18), 0 0 12px rgba(47,143,255,0.7);
  }
  .btn-instagram:hover{ border-color: var(--glow-blue); background:#102B38; }

  .btn-publicita{
    background: linear-gradient(135deg, rgba(52,229,164,0.14), rgba(47,143,255,0.14));
    border:1px solid rgba(52,229,164,0.4);
  }
  .btn-publicita .bulb{
    background: linear-gradient(135deg, var(--glow-green), var(--glow-blue));
    box-shadow: 0 0 0 4px rgba(255,255,255,0.10), 0 0 14px rgba(52,229,164,0.6);
  }
  .btn-publicita:hover{ border-color: rgba(255,255,255,0.5); }

  footer{
    text-align:center;
    margin-top:36px;
    color:var(--text-lo);
    font-size:12px;
    letter-spacing:0.4px;
  }
</style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div class="glow-orb" aria-hidden="true"></div>
      <div class="brand">TE CONVIENE</div>
      <div class="tagline">Contenido, ventas y oportunidades en un solo lugar</div>
    </div>

    <div class="links">
      <a class="link-btn btn-whatsapp" href="https://wa.me/59175473573?text=Hola%2C%20vi%20tu%20TikTok%20y%20quiero%20m%C3%A1s%20informaci%C3%B3n" target="_blank" rel="noopener">
        <span class="bulb" aria-hidden="true"></span>
        <span class="label">Escríbeme por WhatsApp</span>
        <span class="arrow">›</span>
      </a>

      <a class="link-btn btn-instagram" href="https://instagram.com/leonalbertalmanza" target="_blank" rel="noopener">
        <span class="bulb" aria-hidden="true"></span>
        <span class="label">Sígueme en Instagram</span>
        <span class="arrow">›</span>
      </a>

      <a class="link-btn btn-publicita" href="https://wa.me/59175473573?text=Hola%2C%20quiero%20publicitar%20un%20servicio%20o%20una%20venta" target="_blank" rel="noopener">
        <span class="bulb" aria-hidden="true"></span>
        <span class="label">Quiero publicitar un servicio o una venta</span>
        <span class="arrow">›</span>
      </a>
    </div>

    <footer>© Te Conviene · @leonalbertalmanza</footer>
  </div>
</body>
</html>
